<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before vs After — Workflow Comparison</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f7;
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #aeaeb2;
    --border: rgba(0,0,0,0.1);
    --border-subtle: rgba(0,0,0,0.06);
    /* before — light warm gray for clear visibility */
    --coral-bg: #f4f1ee;
    --coral-border: rgba(120, 84, 62, 0.32);
    --coral-text: #2b2019;
    --coral-sub: #5f4d42;
    --teal-bg: rgba(29,158,117,.09);
    --teal-border: rgba(29,158,117,.25);
    --teal-text: #085041;
    --teal-sub: #0F6E56;
    --teal-cp: rgba(29,158,117,.4);
    --teal-cp-bg: rgba(29,158,117,.15);
    --coral-cp: rgba(120, 84, 62, 0.38);
    --coral-cp-bg: rgba(120, 84, 62, 0.12);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .08em;
    color: var(--text-tertiary);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .section-title {
    font-size: 28px;
    font-weight: 300;
    margin-bottom: 40px;
    letter-spacing: -.4px;
    color: var(--text-primary);
  }

  .block-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .06em;
    color: var(--text-tertiary);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 0;
    width: 100%;
    margin-bottom: 12px;
  }

  .node {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 68px;
    border-radius: 14px;
    flex: 1;
    padding: 0 12px;
  }

  .node-label {
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    letter-spacing: -.1px;
  }

  .node-sub {
    font-size: 11px;
    text-align: center;
    margin-top: 3px;
    letter-spacing: .01em;
    opacity: .65;
  }

  .node-start {
    background: var(--bg-secondary);
    border: 0.5px solid var(--border);
    flex: 1.1 !important;
  }

  .node-start .node-label { color: var(--text-primary); }
  .node-start .node-sub { color: var(--text-secondary); }

  .node-before {
    background: var(--coral-bg);
    border: 0.5px solid var(--coral-border);
  }
  .node-before .node-label { color: var(--coral-text); }
  .node-before .node-sub { color: var(--coral-sub); }

  .node-after {
    background: var(--teal-bg);
    border: 0.5px solid var(--teal-border);
  }
  .node-after .node-label { color: var(--teal-text); }
  .node-after .node-sub { color: var(--teal-sub); }

  .node-big { flex: 3.5 !important; position: relative; }

  .no-checkpoint-badge {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-size: 10px;
    font-weight: 500;
    background: var(--bg);
    border: 0.5px solid var(--coral-border);
    color: var(--coral-sub);
    padding: 2px 9px;
    border-radius: 20px;
    letter-spacing: .03em;
  }

  .arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    flex-shrink: 0;
  }

  .arrow svg { width: 18px; height: 18px; }
  .arrow-before path { stroke: rgba(120, 84, 62, .42); }
  .arrow-after path { stroke: rgba(29,158,117,.55); }

  .checkpoint {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    flex-shrink: 0;
  }

  .cp-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--teal-cp-bg);
    border: 0.5px solid var(--teal-cp);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .checkpoint-before .cp-dot {
    background: var(--coral-cp-bg);
    border: 0.5px solid var(--coral-cp);
  }

  .checkpoint-before .cp-tick {
    display: none;
  }

  .cp-tick {
    width: 7px;
    height: 5px;
    border-left: 1.5px solid var(--teal-sub);
    border-bottom: 1.5px solid var(--teal-sub);
    transform: rotate(-45deg) translate(1px, -1px);
  }

  .outcome {
    border-radius: 14px;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
    gap: 16px;
  }

  .outcome-before {
    background: var(--coral-bg);
    border: 0.5px solid var(--coral-border);
  }

  .outcome-after {
    background: var(--teal-bg);
    border: 0.5px solid var(--teal-border);
  }

  .outcome-title {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 3px;
  }

  .outcome-before .outcome-title { color: var(--coral-text); }
  .outcome-after .outcome-title { color: var(--teal-text); }

  .outcome-desc { font-size: 12px; opacity: .7; }
  .outcome-before .outcome-desc { color: var(--coral-sub); }
  .outcome-after .outcome-desc { color: var(--teal-sub); }

  .tag {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 11px;
    border-radius: 20px;
    letter-spacing: .02em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .tag-bad { background: rgba(0,0,0,.04); color: var(--text-secondary); }
  .tag-good { background: rgba(29,158,117,.12); color: var(--teal-text); }

  .divider {
    width: 100%;
    height: 0.5px;
    background: var(--border-subtle);
    margin: 0 0 40px;
  }

  /* Case study embed: fill iframe width, responsive padding & horizontal scroll for long rows */
  .page {
    margin: 0;
    max-width: 100%;
    padding: clamp(28px, 5vw, 64px) clamp(14px, 3vw, 48px) clamp(40px, 7vw, 80px);
  }
  @media (max-width: 720px) {
    .row {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 6px;
      margin-bottom: 10px;
    }
    .section-title { font-size: clamp(1.35rem, 5vw, 1.75rem); }
    .outcome { flex-wrap: wrap; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="page">

  <p class="block-label">Before — one giant leap</p>
  <div class="no-checkpoint-badge" style="position: static; transform: none; display: inline-block; margin: 0 0 12px;">no checkpoints</div>

  <div class="row">
    <div class="node node-start"><span class="node-label">Prompt</span></div>
    <div class="arrow arrow-before">
      <svg viewBox="0 0 18 18" fill="none"><path d="M4 9h10M10 5l4 4-4 4" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="node node-before">
      <span class="node-label">Script</span>
      <span class="node-sub">generated</span>
    </div>
    <div class="checkpoint checkpoint-before"><div class="cp-dot"><div class="cp-tick"></div></div></div>
    <div class="node node-before">
      <span class="node-label">Visuals</span>
      <span class="node-sub">generated</span>
    </div>
    <div class="checkpoint checkpoint-before"><div class="cp-dot"><div class="cp-tick"></div></div></div>
    <div class="node node-before">
      <span class="node-label">Shots</span>
      <span class="node-sub">generated</span>
    </div>
    <div class="arrow arrow-before">
      <svg viewBox="0 0 18 18" fill="none"><path d="M4 9h10M10 5l4 4-4 4" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="node node-start"><span class="node-label">Output</span></div>
  </div>
  <div class="divider"></div>

  <p class="block-label">After — staged with checkpoints</p>

  <div class="row">
    <div class="node node-start"><span class="node-label">Prompt</span></div>
    <div class="arrow arrow-after">
      <svg viewBox="0 0 18 18" fill="none"><path d="M4 9h10M10 5l4 4-4 4" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="node node-after">
      <span class="node-label">Basics</span>
      <span class="node-sub">tone, goal, audience</span>
    </div>
    <div class="checkpoint"><div class="cp-dot"><div class="cp-tick"></div></div></div>
    <div class="node node-after">
      <span class="node-label">Outline</span>
      <span class="node-sub">structure, beats</span>
    </div>
    <div class="checkpoint"><div class="cp-dot"><div class="cp-tick"></div></div></div>
    <div class="node node-after">
      <span class="node-label">Script</span>
      <span class="node-sub">dialogue, narration</span>
    </div>
    <div class="checkpoint"><div class="cp-dot"><div class="cp-tick"></div></div></div>
    <div class="node node-after">
      <span class="node-label">Visuals</span>
      <span class="node-sub">shots, scenes</span>
    </div>
    <div class="arrow arrow-after">
      <svg viewBox="0 0 18 18" fill="none"><path d="M4 9h10M10 5l4 4-4 4" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="node node-start"><span class="node-label">Output</span></div>
  </div>


</div>
</body>
</html>
