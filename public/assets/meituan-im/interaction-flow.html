<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>FixIt Express — Interaction Flow</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  html, body { margin:0; padding:0; background:#EDE6D6; font-family:-apple-system,system-ui,sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="flow-root"></div>
<script type="text/babel">
// FixIt Express — single-phone interaction flow.
// Streams the chat conversation through stages 1→4. Same visual language
// as the static screens, but messages append over time as the script plays.

const FC = {
  // surfaces — warmer, layered creams
  bg:        '#EDE6D6', // conversation area (slightly deeper)
  chrome:    '#F6F1E4', // header + composer (warm off-white, NOT pure white)
  surface:   '#FFFCF6', // cards (warm white, not pure)
  surfaceAlt:'#F4EDDB',
  // ink
  ink:       '#1A1815', inkSoft: '#3D3935', muted: '#8A847C',
  hairline:  '#E0D8C5', divider: '#EAE2CE',
  // brand — peach/terracotta gradient family
  accent:    '#C76140', // terracotta primary (slightly warmer)
  accentInk: '#7A3A24',
  accentBg:  '#F6E4D8',
  peach:     '#E89B6E', // gradient mid
  peachSoft: '#FBE7D4',
  apricot:   '#F2C28A', // gradient highlight
  // secondary
  forest:    '#3E7A5C', forestBg: '#E8F0EA',
  amber:     '#C9882B', amberBg: '#FBF1DE',
  // bubbles
  botBubble: '#FFFCF6', // bot bubble (warm white)
  proBubble: '#FBF1E5', // pro bubble — soft peach tint, sets it apart
  meBubble:  '#E8DCC4', // user bubble — warm tan
  meInk:     '#3D3935', link: '#3D5A82',
};
const FF = {
  display: '-apple-system, "SF Pro Display", system-ui, sans-serif',
  text: '-apple-system, "SF Pro Text", system-ui, sans-serif',
};

// ─── Chrome ────────────────────────────────────────────────────────
function StatusBar() {
  return (
    <div style={{
      height: 54, padding: '18px 30px 0', flexShrink: 0,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      fontFamily: FF.display, fontWeight: 600, fontSize: 16, color: FC.ink,
    }}>
      <span>9:41</span>
      <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
        <svg width="17" height="11" viewBox="0 0 17 11"><rect x="0" y="6.5" width="3" height="4.5" rx="0.7" fill={FC.ink}/><rect x="4.5" y="4.2" width="3" height="6.8" rx="0.7" fill={FC.ink}/><rect x="9" y="2" width="3" height="9" rx="0.7" fill={FC.ink}/><rect x="13.5" y="0" width="3" height="11" rx="0.7" fill={FC.ink}/></svg>
        <svg width="16" height="11" viewBox="0 0 16 11"><path d="M8 3.4C10.1 3.4 12 4.2 13.4 5.6L14.4 4.6C12.7 2.9 10.4 1.9 8 1.9C5.6 1.9 3.3 2.9 1.6 4.6L2.6 5.6C4 4.2 5.9 3.4 8 3.4Z" fill={FC.ink}/><path d="M8 6.7C9.2 6.7 10.3 7.1 11.2 8L12.2 7C10.9 5.9 9.5 5.2 8 5.2C6.5 5.2 5.1 5.9 3.8 7L4.8 8C5.7 7.1 6.8 6.7 8 6.7Z" fill={FC.ink}/><circle cx="8" cy="9.6" r="1.4" fill={FC.ink}/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke={FC.ink} strokeOpacity="0.4" fill="none"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill={FC.ink}/><rect x="22.5" y="4" width="1.5" height="4" rx="0.5" fill={FC.ink} fillOpacity="0.4"/></svg>
      </div>
    </div>
  );
}
function HomeIndicator() {
  return (
    <div style={{ height: 28, display: 'flex', justifyContent: 'center', alignItems: 'flex-end', paddingBottom: 8, flexShrink: 0 }}>
      <div style={{ width: 134, height: 5, borderRadius: 100, background: FC.ink }} />
    </div>
  );
}
function Header({ active = 1 }) {
  const steps = ['Identify', 'Diagnose', 'Estimate', 'Match'];
  return (
    <div style={{ background: FC.chrome, borderBottom: `1px solid ${FC.hairline}`, flexShrink: 0 }}>
      <div style={{ height: 52, display: 'flex', alignItems: 'center', padding: '0 18px', justifyContent: 'space-between' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <svg width="10" height="18" viewBox="0 0 10 18"><path d="M8 1L1 9l7 8" stroke={FC.ink} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" fill="none"/></svg>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <span style={{ fontFamily: FF.display, fontSize: 17, fontWeight: 600, letterSpacing: '-0.2px', color: FC.ink }}>Repair specialist</span>
            <span style={{ fontSize: 10, fontWeight: 700, padding: '3px 7px', borderRadius: 3, background: FC.ink, color: FC.surface, letterSpacing: '0.5px' }}>FIXIT</span>
          </div>
        </div>
        <svg width="20" height="6" viewBox="0 0 20 6"><circle cx="2.5" cy="3" r="1.8" fill={FC.ink}/><circle cx="10" cy="3" r="1.8" fill={FC.ink}/><circle cx="17.5" cy="3" r="1.8" fill={FC.ink}/></svg>
      </div>
      <div style={{ padding: '4px 18px 14px', display: 'flex', alignItems: 'center', gap: 8 }}>
        {steps.map((s, i) => {
          const idx = i + 1;
          const isActive = idx === active;
          const isPast = idx < active;
          return (
            <React.Fragment key={s}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, transition: 'all .35s' }}>
                <div style={{
                  width: 18, height: 18, borderRadius: 9, fontSize: 10, fontWeight: 700,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  background: isActive ? FC.ink : (isPast ? FC.ink : 'transparent'),
                  color: isActive || isPast ? FC.surface : FC.muted,
                  border: !isActive && !isPast ? `1px solid ${FC.hairline}` : 'none',
                  fontFamily: FF.text, transition: 'all .35s',
                }}>{isPast ? '✓' : idx}</div>
                <span style={{
                  fontSize: 12, fontWeight: isActive ? 600 : 500,
                  color: isActive ? FC.ink : FC.muted, fontFamily: FF.text, letterSpacing: '-0.1px',
                  transition: 'all .35s',
                }}>{s}</span>
              </div>
              {idx < steps.length && <div style={{ flex: 1, height: 1, background: FC.hairline }} />}
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}

function IconBtn({ children }) {
  return (
    <div style={{ width: 34, height: 34, borderRadius: 17, border: `1px solid ${FC.hairline}`, background: FC.surface, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{children}</div>
  );
}
function Composer({ leftLabel }) {
  return (
    <div style={{ background: FC.chrome, padding: '10px 14px 8px', borderTop: `1px solid ${FC.hairline}`, flexShrink: 0 }}>
      {leftLabel && (
        <div style={{ marginLeft: 4, marginBottom: 8 }}>
          <span style={{ fontSize: 11, color: FC.muted, fontFamily: FF.text, letterSpacing: '0.3px', textTransform: 'uppercase' }}>{leftLabel}</span>
        </div>
      )}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <IconBtn><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v6M7 9v4M3 5l-2 2 2 2M11 5l2 2-2 2" stroke={FC.ink} strokeWidth="1.4" strokeLinecap="round"/></svg></IconBtn>
        <div style={{ flex: 1, height: 38, background: FC.surface, borderRadius: 19, border: `1px solid ${FC.hairline}`, display: 'flex', alignItems: 'center', padding: '0 14px', color: FC.muted, fontSize: 13, fontFamily: FF.text }}>Reply to Mike Chen…</div>
        <IconBtn><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke={FC.ink} strokeWidth="1.4"/><circle cx="6" cy="7" r="0.8" fill={FC.ink}/><circle cx="10" cy="7" r="0.8" fill={FC.ink}/><path d="M5.5 9.5c1 1.2 4 1.2 5 0" stroke={FC.ink} strokeWidth="1.2" strokeLinecap="round" fill="none"/></svg></IconBtn>
        <IconBtn><svg width="12" height="12" viewBox="0 0 12 12"><path d="M6 1.5v9M1.5 6h9" stroke={FC.ink} strokeWidth="1.5" strokeLinecap="round"/></svg></IconBtn>
      </div>
    </div>
  );
}

// ─── Avatars / bubbles / common ───────────────────────────────────
function BotAvatar() {
  return <div style={{ width: 30, height: 30, borderRadius: 8, background: FC.ink, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, color: FC.accent, fontSize: 13, fontWeight: 700, fontFamily: FF.display }}>F</div>;
}
function ProAvatar() {
  return <div style={{ width: 30, height: 30, borderRadius: 8, flexShrink: 0, background: 'linear-gradient(135deg, #C7855E, #8B5036)', color: FC.surface, fontSize: 12, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: FF.display }}>MC</div>;
}
function UserAvatar() {
  return <div style={{ width: 30, height: 30, borderRadius: 8, flexShrink: 0, background: FC.meBubble, border: `1px solid ${FC.hairline}`, color: FC.ink, fontSize: 12, fontWeight: 600, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: FF.display }}>EW</div>;
}

const ENTER = { animation: 'msg-enter .28s ease-out both' };

function BotBubble({ children }) {
  return (
    <div style={{ display: 'flex', gap: 8, padding: '6px 14px', alignItems: 'flex-start', ...ENTER }}>
      <BotAvatar />
      <div style={{ background: FC.botBubble, borderRadius: '4px 14px 14px 14px', padding: '12px 14px', maxWidth: 268, fontSize: 14.5, lineHeight: '21px', color: FC.inkSoft, fontFamily: FF.text, border: `1px solid ${FC.hairline}` }}>{children}</div>
    </div>
  );
}
function ProBubble({ children }) {
  return (
    <div style={{ padding: '4px 14px', ...ENTER }}>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginLeft: 38, marginBottom: 4 }}>
        <span style={{ fontSize: 12, color: FC.ink, fontWeight: 600, fontFamily: FF.text }}>Mike Chen</span>
        <span style={{ fontSize: 11, color: FC.muted, fontFamily: FF.text }}>Plumbing specialist</span>
      </div>
      <div style={{ display: 'flex', gap: 8, alignItems: 'flex-start' }}>
        <ProAvatar />
        <div style={{ background: FC.proBubble, borderRadius: '4px 14px 14px 14px', padding: '12px 14px', maxWidth: 268, fontSize: 14.5, lineHeight: '21px', color: FC.inkSoft, fontFamily: FF.text, border: `1px solid ${FC.peachSoft}` }}>{children}</div>
      </div>
    </div>
  );
}
function MeBubble({ children }) {
  return (
    <div style={{ display: 'flex', gap: 8, padding: '6px 14px', justifyContent: 'flex-end', alignItems: 'flex-start', ...ENTER }}>
      <div style={{ background: FC.meBubble, borderRadius: '14px 4px 14px 14px', padding: '12px 14px', maxWidth: 230, fontSize: 14.5, lineHeight: '21px', color: FC.meInk, fontFamily: FF.text }}>{children}</div>
      <UserAvatar />
    </div>
  );
}
function SystemText({ time, sub }) {
  return (
    <div style={{ textAlign: 'center', padding: '14px 0 6px', ...ENTER }}>
      <div style={{ fontSize: 11, color: FC.muted, fontFamily: FF.text, letterSpacing: '0.3px' }}>{time}</div>
      {sub && <div style={{ fontSize: 11, color: FC.muted, marginTop: 4, fontFamily: FF.text }}>{sub}</div>}
    </div>
  );
}
function Divider({ label }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '20px 30px 14px', ...ENTER }}>
      <div style={{ flex: 1, height: 1, background: FC.hairline }} />
      <span style={{ fontSize: 11, color: FC.muted, fontFamily: FF.text, letterSpacing: '0.4px', textTransform: 'uppercase', fontWeight: 600 }}>{label}</span>
      <div style={{ flex: 1, height: 1, background: FC.hairline }} />
    </div>
  );
}
function TypingBubble({ variant }) {
  const Av = variant === 'pro' ? ProAvatar : BotAvatar;
  return (
    <div style={{ display: 'flex', gap: 8, padding: '6px 14px', alignItems: 'flex-start', ...ENTER }}>
      <Av />
      <div style={{ background: FC.surface, borderRadius: '4px 14px 14px 14px', padding: '14px 16px', border: `1px solid ${FC.hairline}`, display: 'flex', gap: 4 }}>
        {[0, 1, 2].map(i => (
          <span key={i} style={{ width: 6, height: 6, borderRadius: 3, background: FC.muted, animation: `bounce 1.1s ${i * 0.15}s infinite` }} />
        ))}
      </div>
    </div>
  );
}

function Hero() {
  return (
    <div style={{ margin: '14px 14px 0', borderRadius: 18, overflow: 'hidden', background: 'linear-gradient(135deg, #2A1F18 0%, #1A1815 55%, #2E1A12 100%)', position: 'relative', height: 152, color: FC.surface, ...ENTER, flexShrink: 0 }}>
      <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(120% 80% at 100% 0%, rgba(232,155,110,0.42), transparent 60%)' }} />
      <div style={{ padding: '20px 20px 0', position: 'relative', zIndex: 2 }}>
        <div style={{ fontSize: 11, fontFamily: FF.text, color: 'rgba(255,255,255,0.65)', letterSpacing: '1.2px', textTransform: 'uppercase', fontWeight: 600 }}>FixIt Express</div>
        <div style={{ marginTop: 6, fontSize: 22, fontFamily: FF.display, fontWeight: 700, letterSpacing: '-0.6px', lineHeight: '26px' }}>A specialist on the line<br/>in 30 seconds.</div>
        <div style={{ marginTop: 12, display: 'flex', gap: 14, fontSize: 11, fontFamily: FF.text, color: 'rgba(255,255,255,0.85)' }}>
          {['Verified pros', 'Free diagnosis', 'Open quotes'].map(t => (
            <div key={t} style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
              <span style={{ width: 4, height: 4, borderRadius: 2, background: FC.apricot }} />{t}
            </div>
          ))}
        </div>
      </div>
      <svg viewBox="0 0 200 200" width="170" height="170" style={{ position: 'absolute', right: -28, top: -16, opacity: 0.22 }}>
        <circle cx="100" cy="100" r="78" fill="none" stroke={FC.apricot} strokeWidth="1"/>
        <circle cx="100" cy="100" r="56" fill="none" stroke={FC.apricot} strokeWidth="1"/>
        <path d="M70 70 L130 130 M75 65 a14 14 0 1 0 -10 10 L130 130 a14 14 0 1 1 -10 10 Z" fill="none" stroke={FC.peach} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    </div>
  );
}

// Suggested question pill (tap to send)
function SuggestedQ({ children, onTap }) {
  return (
    <div onClick={onTap} style={{
      padding: '10px 12px', border: `1px solid ${FC.hairline}`, borderRadius: 8,
      color: FC.ink, fontSize: 13.5, fontFamily: FF.text, cursor: 'pointer',
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      background: FC.surface, transition: 'all .15s',
    }}
    onMouseEnter={e => e.currentTarget.style.background = FC.surfaceAlt}
    onMouseLeave={e => e.currentTarget.style.background = FC.surface}>
      <span>{children}</span>
      <svg width="6" height="10" viewBox="0 0 6 10"><path d="M1 1l4 4-4 4" stroke={FC.muted} strokeWidth="1.4" fill="none" strokeLinecap="round"/></svg>
    </div>
  );
}

function VideoMessage() {
  return (
    <div style={{ display: 'flex', justifyContent: 'flex-end', padding: '6px 14px', gap: 8, alignItems: 'flex-start', ...ENTER }}>
      <div style={{ width: 192, height: 212, borderRadius: 14, overflow: 'hidden', position: 'relative', border: `1px solid ${FC.hairline}` }}>
        <svg viewBox="0 0 192 212" width="192" height="212" style={{ position: 'absolute', inset: 0 }}>
          <rect width="192" height="212" fill="#B5A998"/>
          <rect x="0" y="0" width="192" height="124" fill="#C9C0B0"/>
          <line x1="96" y1="0" x2="96" y2="124" stroke="#A99F8E" strokeWidth="0.5"/>
          <rect x="0" y="124" width="192" height="88" fill="#7A6F5F"/>
          <ellipse cx="92" cy="166" rx="38" ry="13" fill="#F4F0EA"/>
          <ellipse cx="92" cy="161" rx="34" ry="10" fill="#E2DCD0"/>
          <rect x="76" y="112" width="32" height="38" rx="3" fill="#F4F0EA"/>
        </svg>
        <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <div style={{ width: 46, height: 46, borderRadius: 23, background: 'rgba(255,255,255,0.85)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <svg width="13" height="15" viewBox="0 0 13 15"><path d="M2 1.5L12 7.5L2 13.5Z" fill={FC.ink}/></svg>
          </div>
        </div>
        <div style={{ position: 'absolute', bottom: 8, left: 10, color: FC.surface, fontSize: 11, fontFamily: FF.text, fontWeight: 500, letterSpacing: '0.3px', textShadow: '0 1px 2px rgba(0,0,0,0.4)' }}>00:15</div>
      </div>
      <UserAvatar />
    </div>
  );
}

function PhotoStrip() {
  const Img = ({ play }) => (
    <div style={{ width: 42, height: 42, borderRadius: 6, background: '#E2DCD0', position: 'relative', overflow: 'hidden' }}>
      <svg viewBox="0 0 42 42" width="42" height="42"><rect width="42" height="42" fill="#E2DCD0"/><ellipse cx="21" cy="27" rx="12" ry="6" fill="#F4F0EA"/><rect x="13" y="13" width="16" height="16" rx="2" fill="#F4F0EA"/></svg>
      {play && <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'rgba(0,0,0,0.25)' }}><svg width="9" height="11" viewBox="0 0 9 11"><path d="M1 1l7 4.5L1 10z" fill={FC.surface}/></svg></div>}
    </div>
  );
  return (
    <div style={{ display: 'flex', gap: 5, alignItems: 'center' }}>
      <Img/><Img/><Img/><Img play/>
      <svg width="6" height="10" viewBox="0 0 6 10"><path d="M1 1l4 4-4 4" stroke={FC.muted} strokeWidth="1.4" fill="none" strokeLinecap="round"/></svg>
    </div>
  );
}
function OrderRow({ k, v, last }) {
  return (
    <div style={{ display: 'flex', gap: 14, padding: '10px 0', borderBottom: last ? 'none' : `1px solid ${FC.divider}`, alignItems: 'flex-start' }}>
      <div style={{ width: 72, color: FC.muted, fontFamily: FF.text, fontSize: 12, paddingTop: 1, textTransform: 'uppercase', letterSpacing: '0.4px', fontWeight: 500 }}>{k}</div>
      <div style={{ flex: 1, fontSize: 13.5, fontFamily: FF.text, color: FC.ink }}>{v}</div>
    </div>
  );
}
function PrimaryBtn({ children, full, disabled, onClick }) {
  return (
    <button onClick={disabled ? undefined : onClick} style={{
      height: 46, width: full ? '100%' : 'auto', padding: full ? 0 : '0 24px',
      border: 0, borderRadius: 23,
      background: disabled ? FC.hairline : FC.accent,
      color: disabled ? FC.muted : FC.surface,
      fontWeight: 600, fontSize: 14.5, fontFamily: FF.display, letterSpacing: '-0.1px',
      cursor: disabled ? 'default' : 'pointer',
    }}>{children}</button>
  );
}
function GhostBtn({ children, onClick }) {
  return (
    <button onClick={onClick} style={{
      height: 32, padding: '0 14px', borderRadius: 16, border: `1px solid ${FC.hairline}`,
      background: FC.surface, color: FC.inkSoft, fontFamily: FF.text, fontSize: 12, cursor: 'pointer',
    }}>{children}</button>
  );
}

function RepairOrderCard({ pending, onGetQuotes }) {
  return (
    <div style={{ padding: '6px 14px', ...ENTER }}>
      <div style={{ marginBottom: 4, marginLeft: 38, fontSize: 12, color: FC.ink, fontWeight: 600, fontFamily: FF.text }}>
        Mike Chen <span style={{ color: FC.muted, fontWeight: 400, marginLeft: 6 }}>drafted your repair order</span>
      </div>
      <div style={{ display: 'flex', gap: 8, alignItems: 'flex-start' }}>
        <ProAvatar />
        <div style={{ background: FC.surface, borderRadius: '4px 14px 14px 14px', flex: 1, padding: '16px 18px 18px', border: `1px solid ${FC.hairline}` }}>
          <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 6 }}>
            <span style={{ fontFamily: FF.display, fontSize: 15, fontWeight: 700, color: FC.ink, letterSpacing: '-0.2px' }}>Repair order</span>
            <span style={{ fontSize: 11, color: FC.muted, fontFamily: FF.text }}>Draft #4729</span>
          </div>
          <OrderRow k="Issue" v="TOTO toilet · sewer odor" />
          <OrderRow k="Photos" v={<PhotoStrip />} />
          <OrderRow k="Plan" v={<>
            <div>Replace flange wax ring</div>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 6, marginTop: 4 }}>
              <span style={{ fontSize: 11, color: FC.muted, fontFamily: FF.text }}>Estimate</span>
              <span style={{ color: FC.accent, fontWeight: 700, fontSize: 16, fontFamily: FF.display }}>$35</span>
              <span style={{ fontSize: 11, color: FC.muted, fontFamily: FF.text }}>· final on inspection</span>
            </div>
          </>} />
          <OrderRow k="When" v={<span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
            {pending ? <span style={{ color: FC.accent }}>Pick a time</span> : 'Right now'}
            <svg width="6" height="10" viewBox="0 0 6 10"><path d="M1 1l4 4-4 4" stroke={FC.muted} strokeWidth="1.4" fill="none" strokeLinecap="round"/></svg>
          </span>} />
          <OrderRow last k="Where" v={<span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>820 W Ridge Ln, Apt 4B<svg width="6" height="10" viewBox="0 0 6 10"><path d="M1 1l4 4-4 4" stroke={FC.muted} strokeWidth="1.4" fill="none" strokeLinecap="round"/></svg></span>} />
          <div style={{ marginTop: 16 }}>
            <PrimaryBtn full disabled={pending} onClick={onGetQuotes}>{pending ? 'Set a time to continue' : 'Request quotes'}</PrimaryBtn>
          </div>
        </div>
      </div>
    </div>
  );
}

function Tag({ children, tone = 'neutral' }) {
  const t = tone === 'accent' ? { c: FC.accent, bg: FC.accentBg } :
            tone === 'forest' ? { c: FC.forest, bg: FC.forestBg } :

function MerchantQuotesCard({ stale, onView }) {
  const [count, setCount] = React.useState(0);
  React.useEffect(() => {
    if (stale) { setCount(6); return; }
    const t0 = Date.now();
    const tick = () => {
      const p = Math.min(1, (Date.now() - t0) / 2400);
      setCount(Math.round(p * 6));
      if (p < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, [stale]);

  return (
    <div style={{ ...ENTER }}>
      <div style={{ margin: '10px 14px', background: FC.surface, borderRadius: 14, padding: '4px 16px 14px', border: `1px solid ${FC.hairline}` }}>

          }
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: FC.ink, fontFamily: FF.text }}>
              {stale ? 'Quote window expired — re-poll to refresh' : 'Searching nearby pros'}

            {!stale && (
              <div style={{ fontSize: 11, color: FC.muted, marginTop: 2, fontFamily: FF.text }}>
                <span style={{ color: FC.accent, fontWeight: 700, fontVariantNumeric: 'tabular-nums' }}>{count} quotes</span> received · still polling
              </div>
            )}
          </div>
        </div>
        <div style={{ height: 1, background: FC.divider, margin: '0 -16px' }} />
        <VendorCard name="Citrus Home Services" image="bath" button={stale ? 'Grab it' : 'View'} onView={() => onView && onView('citrus')} tags={[{ text: '90-day warranty', tone: 'accent' }, { text: 'Transparent pricing' }, { text: 'No fix, no charge' }]} />

}

// ─── Renderer ─────────────────────────────────────────────────────
function renderMessage(m, ctx) {
  switch (m.type) {
    case 'bot': return <BotBubble key={m.id}>{m.text}</BotBubble>;
    case 'bot-q': return (
      <BotBubble key={m.id}>
        <div>{m.text}</div>
        <div style={{ marginTop: 12, display: 'flex', flexDirection: 'column', gap: 8 }}>
          {m.options.map((q, i) => <SuggestedQ key={i} onTap={() => ctx.onPick(m.id, q)}>{q}</SuggestedQ>)}
        </div>
      </BotBubble>
    );
    case 'pro': return <ProBubble key={m.id}>{m.text}</ProBubble>;
    case 'me': return <MeBubble key={m.id}>{m.text}</MeBubble>;
    case 'me-video': return <VideoMessage key={m.id} />;
    case 'me-photo': return <CatLitterPhoto key={m.id} />;
    case 'system': return <SystemText key={m.id} time={m.time} sub={m.sub} />;
    case 'divider': return <Divider key={m.id} label={m.label} />;
    case 'hero': return <Hero key={m.id} />;
    case 'typing-bot': return <TypingBubble key={m.id} />;
    case 'typing-pro': return <TypingBubble key={m.id} variant="pro" />;
    case 'order': return <RepairOrderCard key={m.id} pending={m.pending} onGetQuotes={() => ctx.onAction('get-quotes')} />;
    case 'quotes': return <MerchantQuotesCard key={m.id} stale={m.stale} onView={(k) => ctx.onAction('view-vendor:' + k)} />;
    case 'expert-intro': return <ExpertIntroCard key={m.id} />;
    case 'product': return <ProductCard key={m.id} />;
    case 'invite': return (
      <div key={m.id} style={{ padding: '6px 14px', ...ENTER }}>
        <div style={{ display: 'flex', gap: 8, alignItems: 'flex-start' }}>
          <ProAvatar />
          <div style={{ background: FC.surface, borderRadius: '4px 14px 14px 14px', flex: 1, padding: '16px 18px', border: `1px solid ${FC.hairline}` }}>
            <div style={{ fontFamily: FF.display, fontSize: 15, fontWeight: 700, color: FC.ink, letterSpacing: '-0.2px' }}>Quick favor — would you rate us?</div>
            <div style={{ marginTop: 8, fontSize: 13, lineHeight: '19px', color: FC.inkSoft, fontFamily: FF.text }}>If you were happy with the service, leave a review. If anything fell short, message me directly and I'll make it right.</div>
            <div style={{ marginTop: 14 }}><PrimaryBtn full onClick={() => ctx.onAction('open-review')}>Rate this service</PrimaryBtn></div>
          </div>
        </div>
        <div style={{ marginLeft: 38, marginTop: 8 }}>
          <button style={{ background: 'transparent', border: 0, color: FC.muted, fontSize: 12, fontFamily: FF.text, padding: '4px 0', cursor: 'pointer' }}>Dismiss</button>
        </div>
      </div>
    );
    default: return null;
  }
}

    { delay: 900,  append: { type: 'typing-pro', id: 't4' } },
    { delay: 700,  replace: 't4', append: { type: 'pro', id: 'p3', text: "I've drafted your repair order below. Confirm the time and address and I'll collect quotes from nearby pros." } },
    { delay: 700,  append: { type: 'order', id: 'order' } },
    { wait: 'action:get-quotes' },
    { delay: 400,  stage: 4, append: { type: 'typing-bot', id: 't5' } },
    { delay: 500,  replace: 't5', append: { type: 'system', id: 's3', time: '5:44 PM' } },
    { delay: 300,  append: { type: 'bot', id: 'b2', text: 'Got it — pinging nearby pros now.' } },

    { wait: 'q1' },
    { delay: 600,  append: { type: 'me', id: 'm1', text: "The toilet's clogged with cat litter" } },
    { delay: 900,  stage: 2, append: { type: 'system', id: 's2', time: '5:40 PM', sub: 'Mike Chen joined the conversation' } },

const STAGE_BY_SCENARIO = {
  default: 1, 'cat-litter': 1, 'off-hours': 1,
  'expired-modal': 4, 'expired-chat': 4, 'return-visit': 4,
};

// ─── Player ───────────────────────────────────────────────────────
function Player({ scenario, onSceneEnd }) {
  const [messages, setMessages] = React.useState([]);
  const [stage, setStage] = React.useState(STAGE_BY_SCENARIO[scenario] || 1);
  const [waiting, setWaiting] = React.useState(null); // id we're waiting on
  const [modal, setModal] = React.useState(null);
  const scrollRef = React.useRef(null);
  const stepIdx = React.useRef(0);
  const cancelled = React.useRef(false);

  // reset on scenario change
  React.useEffect(() => {
    cancelled.current = true;
    setMessages([]);
    setWaiting(null);
    setModal(null);
    setStage(STAGE_BY_SCENARIO[scenario] || 1);
    stepIdx.current = 0;
    cancelled.current = false;
    runFrom(0);
    // eslint-disable-next-line
  }, [scenario]);

  // autoscroll
  React.useEffect(() => {
    const el = scrollRef.current;
    if (el) el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
  }, [messages, modal]);

  function applyStep(step) {
    if (step.stage) setStage(step.stage);
    if (step.action === 'show-modal') {
      setModal('expired');
      return;
    }
    setMessages(prev => {
      let next = prev;
      if (step.replace) next = next.filter(m => m.id !== step.replace);
      if (step.append) next = [...next, step.append];
      return next;
    });
  }

  function runFrom(idx) {
    const script = SCRIPTS[scenario];
    if (!script) return;
    let i = idx;
    const next = () => {
      if (cancelled.current) return;
      if (i >= script.length) { onSceneEnd && onSceneEnd(); return; }
      const step = script[i];
      if (step.wait) {
        setWaiting(step.wait);
        // pause; resumed by user action
        return;
      }
      setTimeout(() => {
        if (cancelled.current) return;
        applyStep(step);
        i++;
        stepIdx.current = i;
        next();
      }, step.delay || 0);
    };
    next();
  }

  function resumeAfterWait(matchKey) {
    if (!waiting) return;
    if (waiting === matchKey || matchKey === '*' || waiting.startsWith('action:') === false) {
      // generic id wait
      setWaiting(null);
      runFrom(stepIdx.current + 1);
      stepIdx.current = stepIdx.current + 1;
    }
  }

  const ctx = {
    onPick: (qId, text) => {
      // append user message in place of waiting, advance
      if (waiting === qId) {
        // strip the bot-q options to lock the choice
        setMessages(prev => prev.map(m => m.id === qId ? { ...m, options: [] } : m));
        setMessages(prev => [...prev, { type: 'me', id: 'pick-' + Date.now(), text }]);
        setWaiting(null);
        runFrom(stepIdx.current + 1);
        stepIdx.current = stepIdx.current + 1;
      }
    },
    onAction: (a) => {
      const key = 'action:' + a;
      if (waiting === key) {
        setWaiting(null);
        runFrom(stepIdx.current + 1);
        stepIdx.current = stepIdx.current + 1;
        return;
      }
      if (a === 'open-review') {
        setModal('review');
        return;
      }
      if (a.startsWith('view-vendor:')) {
        setModal('vendor:' + a.split(':')[1]);
      }
    },
  };

  return (
    <div style={{ width: 390, height: 844, borderRadius: 47, overflow: 'hidden', background: FC.surface, boxShadow: '0 32px 70px rgba(26,24,21,0.18), 0 0 0 1px rgba(26,24,21,0.08)', position: 'relative', display: 'flex', flexDirection: 'column', fontFamily: FF.text, color: FC.ink }}>
      <div style={{ position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)', width: 122, height: 36, borderRadius: 22, background: FC.ink, zIndex: 50 }} />
      <StatusBar />
      <Header active={stage} />
      <div ref={scrollRef} style={{ flex: 1, overflow: 'auto', background: FC.bg, paddingBottom: 14 }}>
        {messages.map(m => renderMessage(m, ctx))}
      </div>
      <Composer leftLabel={scenario === 'return-visit' ? 'Rate this conversation' : null} />
      <HomeIndicator />

      {modal === 'expired' && <ExpiredModal onAct={() => { setModal(null); onSceneEnd && onSceneEnd('expired-chat'); }} />}
      {modal === 'review'  && <ReviewSheet onClose={() => setModal(null)} />}
      {modal && modal.startsWith('vendor:') && <VendorDetailOverlay vendorKey={modal.split(':')[1]} onClose={() => setModal(null)} />}
    </div>
  );
}
