<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>FixIt Express — Phone</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#FFFFFF; font-family: 'Inter', -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; font-feature-settings: 'cv11','ss01','ss03'; }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px 0; background: #FFFFFF; }

  /* ─── Motion system ─────────────────────────────────────────── */
  /* Bubble entrance — gentle spring with transform-origin anchored near avatar */
  @keyframes msg-in {
    0%   { opacity: 0; transform: translateY(10px) scale(.965); filter: blur(2px); }
    60%  { opacity: 1; filter: blur(0); }
    100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }
  @keyframes msg-in-right {
    0%   { opacity: 0; transform: translateY(10px) scale(.965); filter: blur(2px); }
    100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }
  /* Soft system text — pure fade */
  @keyframes soft-in {
    0%   { opacity: 0; transform: translateY(4px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade-in   { from { opacity: 0; } to { opacity: 1; } }
  /* Typing dots — smoother sine wave */
  @keyframes dot-pulse {
    0%, 60%, 100% { transform: translateY(0); opacity: .35; }
    30%           { transform: translateY(-3px); opacity: 1; }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* Modal — iOS spring */
  @keyframes sheet-up { 0% { transform: translateY(100%); } 100% { transform: translateY(0); } }
  @keyframes pop-in {
    0%   { opacity: 0; transform: scale(.92) translateY(8px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  /* Stage rail — shimmer pulse on active dot */
  @keyframes ring-pulse {
    0%   { box-shadow: 0 0 0 0 rgba(232,163,23,.50); }
    70%  { box-shadow: 0 0 0 7px rgba(232,163,23,0); }
    100% { box-shadow: 0 0 0 0 rgba(232,163,23,0); }
  }
  /* Joined-conversation ceremony */
  @keyframes joined-rise {
    0%   { opacity: 0; transform: translateY(-6px); letter-spacing: 0.6px; }
    100% { opacity: 1; transform: translateY(0); letter-spacing: 0.3px; }
  }
  @keyframes avatar-pop {
    0%   { transform: scale(.6); opacity: 0; }
    60%  { transform: scale(1.06); }
    100% { transform: scale(1); opacity: 1; }
  }
  /* Number flip */
  @keyframes num-up {
    0%   { transform: translateY(8px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }
  /* Hero ambient glow drift */
  @keyframes glow-drift {
    0%, 100% { transform: translate(0,0) scale(1); }
    50%      { transform: translate(-6px,4px) scale(1.05); }
  }
  /* Connecting-to-specialist scanning line */
  @keyframes scan-line {
    0%   { left: -28%; opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { left: 100%; opacity: 0; }
  }
  /* License-found checkmark draw */
  @keyframes check-draw {
    0%   { stroke-dashoffset: 14; }
    100% { stroke-dashoffset: 0; }
  }
  /* Button press */
  .btn-press { transition: transform .15s cubic-bezier(.2,.7,.2,1), box-shadow .15s, background-color .2s; }
  .btn-press:active { transform: scale(.97); }

  /* Scroll polish */
  .scroll::-webkit-scrollbar { width: 0; height: 0; }

  /* Tabular numerics for prices/counts/timers */
  .tnum { font-variant-numeric: tabular-nums; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="flow-root"></div>
<script type="text/babel">
// FixIt Express — single-phone interaction flow.
// Streams the chat conversation through stages 1→4. Same visual language
// as the static screens, but messages append over time as the script plays.

const FC = {
  // surfaces — editorial white, very soft warm cream secondaries
  bg:        '#FFFFFF',  // conversation area (pure white)
  chrome:    '#FFFFFF',  // header + composer
  surface:   '#FFFFFF',  // cards (pure white)
  surfaceAlt:'#F7F1DF',
  surfaceDeep:'#EFE7CF',
  // ink — warm near-black
  ink:       '#14120F', inkSoft: '#3A3530', muted: '#857F73', mutedSoft: '#B7B0A1',
  hairline:  '#EAE2CC', divider: '#F1EAD3', hairlineSoft: '#F5EFDF',
  // brand — saffron family
  accent:    '#E8A317', // saffron primary
  accentDeep:'#B07A08',
  accentInk: '#5A3D04',
  accentBg:  '#FFF1C8',
  peach:     '#F4C448', // gold gradient mid
  peachSoft: '#FFF6DB',
  apricot:   '#FFD86A', // highlight
  // secondary
  forest:    '#2F6B4E', forestBg: '#E5EEE7',
  amber:     '#B8771F', amberBg: '#F8EBD2',
  // bubbles
  botBubble: '#FFFFFF',
  proBubble: '#FFF6DB',
  meBubble:  '#FFDE7A',   // user — brand saffron; dark ink text
  meInk:     '#14120F',
  meBorder:  '#F0C946',
  link: '#3D5A82',
  // elevation
  shadowSm: '0 1px 2px rgba(20,18,15,.04), 0 1px 0 rgba(20,18,15,.02)',
  shadowMd: '0 1px 2px rgba(20,18,15,.05), 0 6px 18px -6px rgba(20,18,15,.10)',
  shadowLg: '0 2px 4px rgba(20,18,15,.05), 0 22px 48px -16px rgba(20,18,15,.20)',
};
const FF = {
  display: "'Inter', -apple-system, 'SF Pro Display', system-ui, sans-serif",
  text:    "'Inter', -apple-system, 'SF Pro Text', system-ui, sans-serif",
  serif:   "'Instrument Serif', 'Times New Roman', serif",
};

// ─── Chrome ────────────────────────────────────────────────────────
function StatusBar() {
  return (
    <div style={{
      height: 54, padding: '18px 34px 0', flexShrink: 0,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      fontFamily: FF.display, fontWeight: 600, fontSize: 16, color: FC.ink,
      letterSpacing: '-0.2px',
    }}>
      <span className="tnum">9:41</span>
      <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
        <svg width="17" height="11" viewBox="0 0 17 11"><rect x="0" y="6.5" width="3" height="4.5" rx="0.7" fill={FC.ink}/><rect x="4.5" y="4.2" width="3" height="6.8" rx="0.7" fill={FC.ink}/><rect x="9" y="2" width="3" height="9" rx="0.7" fill={FC.ink}/><rect x="13.5" y="0" width="3" height="11" rx="0.7" fill={FC.ink}/></svg>
        <svg width="16" height="11" viewBox="0 0 16 11"><path d="M8 3.4C10.1 3.4 12 4.2 13.4 5.6L14.4 4.6C12.7 2.9 10.4 1.9 8 1.9C5.6 1.9 3.3 2.9 1.6 4.6L2.6 5.6C4 4.2 5.9 3.4 8 3.4Z" fill={FC.ink}/><path d="M8 6.7C9.2 6.7 10.3 7.1 11.2 8L12.2 7C10.9 5.9 9.5 5.2 8 5.2C6.5 5.2 5.1 5.9 3.8 7L4.8 8C5.7 7.1 6.8 6.7 8 6.7Z" fill={FC.ink}/><circle cx="8" cy="9.6" r="1.4" fill={FC.ink}/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke={FC.ink} strokeOpacity="0.4" fill="none"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill={FC.ink}/><rect x="22.5" y="4" width="1.5" height="4" rx="0.5" fill={FC.ink} fillOpacity="0.4"/></svg>
      </div>
    </div>
  );
}
function HomeIndicator() {
  return (
    <div style={{ height: 28, display: 'flex', justifyContent: 'center', alignItems: 'flex-end', paddingBottom: 8, flexShrink: 0 }}>
      <div style={{ width: 134, height: 5, borderRadius: 100, background: FC.ink }} />
    </div>
  );
}
function Header({ active = 1, proJoined = false }) {
  const steps = ['Identify', 'Diagnose', 'Plan', 'Match'];
  const progressPct = ((active - 1) / (steps.length - 1)) * 100;
  const currentStep = steps[Math.max(0, Math.min(steps.length - 1, active - 1))];
  return (
    <div style={{ background: FC.chrome, borderBottom: `1px solid ${FC.hairline}`, flexShrink: 0 }}>
      <div style={{ height: 54, display: 'flex', alignItems: 'center', padding: '0 20px', justifyContent: 'space-between' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <svg width="10" height="18" viewBox="0 0 10 18"><path d="M8 1L1 9l7 8" stroke={FC.ink} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" fill="none"/></svg>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 1, transition: 'opacity .3s ease' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span
                key={proJoined ? 'mike' : 'fixit'}
                style={{
                  fontFamily: FF.display, fontSize: 16, fontWeight: 600,
                  letterSpacing: '-0.2px', color: FC.ink,
                  animation: 'soft-in .32s ease-out both',
                }}
              >
                {proJoined ? 'Mike Chen' : 'Repair specialist'}
              </span>
              <span style={{ width: 6, height: 6, borderRadius: 3, background: FC.forest, boxShadow: `0 0 0 3px ${FC.forestBg}` }} />
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 10.5, color: FC.muted, fontFamily: FF.text, letterSpacing: '.1px' }}>
              {proJoined ? (
                <>
                  <span>Plumbing specialist</span>
                  <span style={{ width: 2, height: 2, borderRadius: 1, background: FC.mutedSoft }} />
                  <span>Step {active}/4 · <span style={{ color: FC.ink, fontWeight: 600 }}>{currentStep}</span></span>
                </>
              ) : (
                <>
                  <svg width="8" height="10" viewBox="0 0 8 10"><rect x="1" y="4" width="6" height="5" rx="1" fill="none" stroke={FC.muted} strokeWidth="1"/><path d="M2.3 4V2.7a1.7 1.7 0 0 1 3.4 0V4" fill="none" stroke={FC.muted} strokeWidth="1" strokeLinecap="round"/></svg>
                  <span>Encrypted · FixIt secured</span>
                  <span style={{ width: 2, height: 2, borderRadius: 1, background: FC.mutedSoft }} />
                  <span>Step {active}/4 · <span style={{ color: FC.ink, fontWeight: 600 }}>{currentStep}</span></span>
                </>
              )}
            </div>
          </div>
        </div>
        <svg width="20" height="6" viewBox="0 0 20 6"><circle cx="2.5" cy="3" r="1.6" fill={FC.muted}/><circle cx="10" cy="3" r="1.6" fill={FC.muted}/><circle cx="17.5" cy="3" r="1.6" fill={FC.muted}/></svg>
      </div>
      {/* Stage rail — single continuous track, current step labeled */}
      <div style={{ padding: '2px 24px 16px' }}>
        <div style={{ position: 'relative', height: 4, borderRadius: 2, background: FC.hairline, overflow: 'visible' }}>
          <div style={{
            position: 'absolute', left: 0, top: 0, bottom: 0, width: `${progressPct}%`,
            background: `linear-gradient(90deg, ${FC.accent}, ${FC.peach})`,
            borderRadius: 2,
            transition: 'width .6s cubic-bezier(.2,.7,.2,1)',
          }} />
          {steps.map((_, i) => {
            const left = (i / (steps.length - 1)) * 100;
            const idx = i + 1;
            const isActive = idx === active;
            const isPast = idx < active;
            return (
              <div key={i} style={{ position: 'absolute', left: `${left}%`, top: '50%', transform: 'translate(-50%, -50%)' }}>
                <div style={{
                  width: isActive ? 14 : 10, height: isActive ? 14 : 10, borderRadius: '50%',
                  background: isActive ? FC.chrome : (isPast ? FC.accent : FC.hairline),
                  border: isActive ? `2.5px solid ${FC.accent}` : 'none',
                  boxShadow: isActive ? '0 1px 3px rgba(197,89,58,.35)' : 'none',
                  transition: 'all .4s cubic-bezier(.2,.7,.2,1)',
                  animation: isActive ? 'ring-pulse 2.4s ease-out infinite' : 'none',
                }} />
              </div>
            );
          })}
        </div>
        <div style={{ marginTop: 8, display: 'flex', justifyContent: 'space-between' }}>
          {steps.map((s, i) => {
            const idx = i + 1;
            const isActive = idx === active;
            const isPast = idx < active;
            return (
              <span key={s} style={{
                fontSize: 10.5, fontFamily: FF.text,
                fontWeight: isActive ? 600 : 500,
                letterSpacing: '.2px',
                color: isActive ? FC.ink : (isPast ? FC.inkSoft : FC.mutedSoft),
                transition: 'color .35s, font-weight .35s',
              }}>{s}</span>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function IconBtn({ children, onClick }) {
  return (
    <button onClick={onClick} className="btn-press" style={{ width: 36, height: 36, borderRadius: 18, border: `1px solid ${FC.hairline}`, background: FC.surface, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', padding: 0 }}>{children}</button>
  );
}
function Composer({ leftLabel, placeholder = 'Reply to Mike Chen…' }) {
  return (
    <div style={{ background: FC.chrome, padding: '12px 16px 10px', borderTop: `1px solid ${FC.hairline}`, flexShrink: 0 }}>
      {leftLabel && (
        <div style={{ marginLeft: 4, marginBottom: 8 }}>
          <span style={{ fontSize: 11, color: FC.muted, fontFamily: FF.text, letterSpacing: '0.3px', textTransform: 'uppercase' }}>{leftLabel}</span>
        </div>
      )}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <IconBtn><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v6M7 9v4M3 5l-2 2 2 2M11 5l2 2-2 2" stroke={FC.ink} strokeWidth="1.4" strokeLinecap="round"/></svg></IconBtn>
        <div style={{ flex: 1, height: 42, background: FC.surface, borderRadius: 21, border: `1px solid ${FC.hairline}`, display: 'flex', alignItems: 'center', padding: '0 18px', color: FC.muted, fontSize: 14, fontFamily: FF.text, boxShadow: 'inset 0 1px 0 rgba(255,255,255,.5)' }}>{placeholder}</div>
        <IconBtn><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke={FC.ink} strokeWidth="1.4"/><circle cx="6" cy="7" r="0.8" fill={FC.ink}/><circle cx="10" cy="7" r="0.8" fill={FC.ink}/><path d="M5.5 9.5c1 1.2 4 1.2 5 0" stroke={FC.ink} strokeWidth="1.2" strokeLinecap="round" fill="none"/></svg></IconBtn>
        <IconBtn><svg width="12" height="12" viewBox="0 0 12 12"><path d="M6 1.5v9M1.5 6h9" stroke={FC.ink} strokeWidth="1.5" strokeLinecap="round"/></svg></IconBtn>
      </div>
    </div>
  );
}

// ─── Avatars / bubbles / common ───────────────────────────────────
function BotAvatar() {
  return (
    <div style={{
      width: 32, height: 32, borderRadius: 11, flexShrink: 0,
      background: `radial-gradient(120% 120% at 20% 0%, #2A2622, ${FC.ink} 70%)`,
      display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative',
      boxShadow: 'inset 0 1px 0 rgba(255,255,255,.08), 0 1px 2px rgba(0,0,0,.14)',
    }}>
      <svg width="15" height="15" viewBox="0 0 14 14">
        <defs>
          <linearGradient id="botMark" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stopColor={FC.apricot}/><stop offset="1" stopColor={FC.accent}/>
          </linearGradient>
        </defs>
        <path d="M7 1.5 L10 4 L8.5 5.5 L11.5 8.5 L9.5 10.5 L6.5 7.5 L5 9 L2.5 6.5 Z" fill="url(#botMark)"/>
      </svg>
    </div>
  );
}
function ProAvatar({ noVerify }) {
  return (
    <div style={{
      width: 32, height: 32, borderRadius: 11, flexShrink: 0,
      background: 'linear-gradient(135deg, #C99A2B 0%, #8A5E04 60%, #5A3D04 100%)',
      color: '#FFF6DB', fontSize: 12, fontWeight: 600,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: FF.display, letterSpacing: '.2px',
      boxShadow: 'inset 0 1px 0 rgba(255,255,255,.22), 0 1px 2px rgba(90,61,4,.30)',
      position: 'relative',
    }}>
      MC
      {!noVerify && (
        <span style={{
          position: 'absolute', right: -2, bottom: -2,
          width: 13, height: 13, borderRadius: 7,
          background: FC.forest, border: `2px solid ${FC.bg}`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <svg width="6" height="6" viewBox="0 0 6 6"><path d="M1 3l1.5 1.5L5 1" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/></svg>
        </span>
      )}
    </div>
  );
}
function UserAvatar() {
  return <div style={{ width: 32, height: 32, borderRadius: 11, flexShrink: 0, background: FC.surfaceDeep, border: `1px solid ${FC.hairline}`, color: FC.ink, fontSize: 12, fontWeight: 600, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: FF.display, letterSpacing: '.2px' }}>EW</div>;
}

const ENTER       = { animation: 'msg-in .42s cubic-bezier(.2,.8,.2,1) both', transformOrigin: '0 0' };
const ENTER_RIGHT = { animation: 'msg-in-right .42s cubic-bezier(.2,.8,.2,1) both', transformOrigin: '100% 0' };
const ENTER_SOFT  = { animation: 'soft-in .35s ease-out both' };

function BotBubble({ children }) {
  return (
    <div style={{ display: 'flex', gap: 9, padding: '5px 16px', alignItems: 'flex-start', ...ENTER }}>
      <BotAvatar />
      <div style={{
        background: FC.botBubble, borderRadius: '5px 18px 18px 18px',
        padding: '12px 15px', maxWidth: 290, fontSize: 15, lineHeight: '22px',
        color: FC.inkSoft, fontFamily: FF.text, border: `1px solid ${FC.hairlineSoft}`,
        boxShadow: FC.shadowSm,
      }}>{children}</div>
    </div>
  );
}
function ProBubble({ children }) {
  return (
    <div style={{ padding: '4px 16px', ...ENTER }}>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 6, marginLeft: 41, marginBottom: 4 }}>
        <span style={{ fontSize: 12, color: FC.ink, fontWeight: 600, fontFamily: FF.text, letterSpacing: '-.05px' }}>Mike Chen</span>
        <span style={{ fontSize: 11, color: FC.muted, fontFamily: FF.text }}>· Plumbing specialist</span>
      </div>
      <div style={{ display: 'flex', gap: 9, alignItems: 'flex-start' }}>
        <ProAvatar />
        <div style={{
          background: FC.proBubble, borderRadius: '5px 18px 18px 18px',
          padding: '12px 15px', maxWidth: 290, fontSize: 15, lineHeight: '22px',
          color: FC.inkSoft, fontFamily: FF.text,
          border: `1px solid #FBE89A`,
          boxShadow: FC.shadowSm,
        }}>{children}</div>
      </div>
    </div>
  );
}
function MeBubble({ children }) {
  return (
    <div style={{ display: 'flex', gap: 9, padding: '5px 16px', justifyContent: 'flex-end', alignItems: 'flex-start', ...ENTER_RIGHT }}>
      <div style={{
        background: FC.meBubble, borderRadius: '18px 5px 18px 18px',
        padding: '12px 15px', maxWidth: 250, fontSize: 15, lineHeight: '22px',
        color: FC.meInk, fontFamily: FF.text, fontWeight: 500,
        border: `1px solid ${FC.meBorder}`,
        boxShadow: '0 1px 2px rgba(176,122,8,.16), 0 6px 18px -10px rgba(232,163,23,.40)',
      }}>{children}</div>
      <UserAvatar />
    </div>
  );
}
// Bot → Pro handoff ceremony — three phases inside a single message slot.
// Phase 0: scanning + "Matching to a plumbing specialist…"
// Phase 1: license-found row with avatar + "Mike Chen · #PL-04382 verified"
// Phase 2: final "joined" pill (matches the legacy visual, kept for continuity)
function Handshake({ time }) {
  const [phase, setPhase] = React.useState(0);
  React.useEffect(() => {
    const t1 = setTimeout(() => setPhase(1), 850);
    const t2 = setTimeout(() => setPhase(2), 1500);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, []);
  return (
    <div style={{ textAlign: 'center', padding: '20px 0 6px' }}>
      <div style={{ fontSize: 10.5, color: FC.muted, fontFamily: FF.text, letterSpacing: '0.5px', textTransform: 'uppercase', fontWeight: 600, animation: 'soft-in .35s ease-out both' }}>{time}</div>
      {/* Phase 0 — scanning */}
      {phase === 0 && (
        <div style={{
          marginTop: 12, display: 'inline-flex', alignItems: 'center', gap: 9,
          padding: '7px 16px', borderRadius: 100,
          background: FC.surface, border: `1px solid ${FC.hairline}`,
          boxShadow: FC.shadowSm, position: 'relative', overflow: 'hidden',
          animation: 'joined-rise .4s cubic-bezier(.2,.8,.2,1) both',
        }}>
          <div style={{
            position: 'absolute', top: 0, bottom: 0, width: '34%',
            background: `linear-gradient(90deg, transparent, ${FC.apricot}aa, transparent)`,
            animation: 'scan-line 1.05s cubic-bezier(.4,0,.2,1) infinite',
            pointerEvents: 'none',
          }} />
          <div style={{
            width: 13, height: 13, borderRadius: 7,
            border: `2px solid ${FC.accent}`, borderTopColor: 'transparent',
            animation: 'spin 0.9s linear infinite', position: 'relative', zIndex: 1,
          }} />
          <span style={{ fontSize: 12.5, fontFamily: FF.text, color: FC.inkSoft, fontWeight: 500, position: 'relative', zIndex: 1 }}>
            Matching to a plumbing specialist<span className="tnum">…</span>
          </span>
        </div>
      )}
      {/* Phase 1 — license found */}
      {phase === 1 && (
        <div key="found" style={{
          marginTop: 12, display: 'inline-flex', alignItems: 'center', gap: 9,
          padding: '7px 14px 7px 7px', borderRadius: 100,
          background: FC.surface, border: `1px solid ${FC.peach}55`,
          boxShadow: `0 1px 2px rgba(176,122,8,.10), 0 8px 20px -10px rgba(232,163,23,.30)`,

// Animated counter — each integer change flips up with a tiny spring
function CountUp({ to, ms = 1800 }) {
  const [n, setN] = React.useState(0);
  React.useEffect(() => {
    let raf;
    const t0 = performance.now();
    const step = (t) => {
      const p = Math.min(1, (t - t0) / ms);
      // ease-out cubic
      const e = 1 - Math.pow(1 - p, 3);
      setN(Math.round(e * to));
      if (p < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [to, ms]);
  return (
    <span key={n} className="tnum" style={{ display: 'inline-block', animation: 'num-up .3s cubic-bezier(.2,.8,.2,1) both' }}>{n}</span>
  );
}

function MerchantQuotesCard({ stale, onView }) {
  // polling progress 0→1 over 2.4s for the demo
  const [progress, setProgress] = React.useState(stale ? 1 : 0);
  React.useEffect(() => {
    if (stale) return;
    let raf;
    const t0 = performance.now();
    const step = (t) => {
      const p = Math.min(1, (t - t0) / 2400);
      setProgress(p);
      if (p < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [stale]);

  // Quote-window countdown — starts at 4:58, ticks down once per second.
  // Visible constraint matters more than the exact number; the live tick is
  // what makes the window feel real.
  const [secondsLeft, setSecondsLeft] = React.useState(298);
  React.useEffect(() => {
    if (stale) return;
    const id = setInterval(() => setSecondsLeft(s => (s > 0 ? s - 1 : 0)), 1000);
    return () => clearInterval(id);
  }, [stale]);
  const mm = String(Math.floor(secondsLeft / 60)).padStart(2, '0');
  const ss = String(secondsLeft % 60).padStart(2, '0');
  const windowExpired = !stale && secondsLeft === 0;

  return (
    <div style={{ ...ENTER }}>
      <div style={{
        margin: '10px 14px', background: FC.surface, borderRadius: 16,
        padding: '0 16px 14px', border: `1px solid ${FC.hairlineSoft}`,

          borderBottom: `1px solid ${FC.divider}`,

              <div style={{ fontSize: 13, fontWeight: 600, color: FC.ink, fontFamily: FF.text, letterSpacing: '-.1px' }}>
                {stale ? 'Quote window expired — re-poll to refresh' : 'Searching nearby pros'}
              </div>
              {!stale && (
                <div style={{ fontSize: 11, color: FC.muted, marginTop: 3, fontFamily: FF.text }}>
                  <span style={{ color: FC.accent, fontWeight: 700 }}><CountUp to={6} ms={2200} /> quotes</span> received · still polling
                </div>
              )}
            </div>
            {!stale && (
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: 9.5, color: FC.muted, letterSpacing: '.5px', textTransform: 'uppercase', fontWeight: 600, fontFamily: FF.text }}>Window</div>
                <div

                    transition: 'color .3s ease',
                  }}
                >
                  {windowExpired ? 'EXPIRED' : `${mm}:${ss}`}
                </div>
              </div>
            )}
          </div>
          {!stale && (
            <div style={{ position: 'absolute', left: 0, right: 0, bottom: 0, height: 2, background: FC.hairlineSoft }}>
              <div style={{
                height: '100%',
                width: `${progress * 100}%`,
                background: `linear-gradient(90deg, ${FC.accent}, ${FC.peach})`,
                transition: 'width .25s linear',
              }} />
            </div>
          )}
        </div>
        {/* Vendors stagger in to make the "calling around" moment feel earned. */}
        {[
          <VendorCard key="v1" name="Citrus Home Services" image="bath" rating="4.9" reviews="2.1k" price="$24 – $108" button={stale ? 'Grab it' : 'View'} onView={() => onView && onView('citrus')} tags={[{ text: '90-day warranty', tone: 'accent' }, { text: 'Transparent pricing' }, { text: 'No fix, no charge' }]} />,

// ─── Renderer ─────────────────────────────────────────────────────
function renderMessage(m, ctx) {
  switch (m.type) {
    case 'bot': return <BotBubble key={m.id}>{m.text}</BotBubble>;
    case 'bot-q': return (
      <BotBubble key={m.id}>
        <div>{m.text}</div>
        <div style={{ marginTop: 12, display: 'flex', flexDirection: 'column', gap: 8 }}>
          {m.options.map((q, i) => <SuggestedQ key={i} onTap={() => ctx.onPick(m.id, q)}>{q}</SuggestedQ>)}
        </div>
      </BotBubble>
    );
    case 'pro': return <ProBubble key={m.id}>{m.text}</ProBubble>;
    case 'me': return <MeBubble key={m.id}>{m.text}</MeBubble>;
    case 'me-video': return <VideoMessage key={m.id} />;
    case 'me-photo': return <CatLitterPhoto key={m.id} />;
    case 'system': return <SystemText key={m.id} time={m.time} sub={m.sub} />;
    case 'handshake': return <Handshake key={m.id} time={m.time} />;
    case 'divider': return <Divider key={m.id} label={m.label} />;
    case 'hero': return <Hero key={m.id} />;
    case 'typing-bot': return <TypingBubble key={m.id} />;
    case 'typing-pro': return <TypingBubble key={m.id} variant="pro" />;
    case 'order': return <RepairOrderCard key={m.id} pending={m.pending} onGetQuotes={() => ctx.onAction('get-quotes')} />;
    case 'quotes': return <MerchantQuotesCard key={m.id} stale={m.stale} onView={(k) => ctx.onAction('view-vendor:' + k)} />;
    case 'booking': return <BookingCard key={m.id} vendorKey={ctx.bookedVendor || m.vendor} orderNum={m.orderNum} />;
    case 'expert-intro': return <ExpertIntroCard key={m.id} />;
    case 'product': return <ProductCard key={m.id} onBuy={() => ctx.onAction('buy-product')} />;
    case 'quick-rating': return <QuickRating key={m.id} onPick={(k) => ctx.onAction('rate:' + k)} />;
    case 'invite': return (
      <div key={m.id} style={{ padding: '6px 14px', ...ENTER }}>
        <div style={{ display: 'flex', gap: 8, alignItems: 'flex-start' }}>
          <ProAvatar />
          <div style={{ background: FC.surface, borderRadius: '4px 14px 14px 14px', flex: 1, padding: '16px 18px', border: `1px solid ${FC.hairline}` }}>
            <div style={{ fontFamily: FF.display, fontSize: 15, fontWeight: 700, color: FC.ink, letterSpacing: '-0.2px' }}>Quick favor — would you rate us?</div>
            <div style={{ marginTop: 8, fontSize: 13, lineHeight: '19px', color: FC.inkSoft, fontFamily: FF.text }}>If you were happy with the service, leave a review. If anything fell short, message me directly and I'll make it right.</div>
            <div style={{ marginTop: 14 }}><PrimaryBtn full onClick={() => ctx.onAction('open-review')}>Rate this service</PrimaryBtn></div>
          </div>
        </div>
        <div style={{ marginLeft: 41, marginTop: 8 }}>
          <button style={{ background: 'transparent', border: 0, color: FC.muted, fontSize: 12, fontFamily: FF.text, padding: '4px 0', cursor: 'pointer' }}>Dismiss</button>
        </div>
      </div>
    );
    default: return null;
  }
}

    // "Yes" path lands here; "talk to a pro" escalates to default scenario.
    { delay: 700,  append: { type: 'typing-pro', id: 't5' } },
    { delay: 900,  replace: 't5', append: { type: 'pro', id: 'p3', text: "Great. I'll close the ticket — ping us anytime if it acts up again." } },
  ],

  'off-hours': [
    { delay: 0,   append: { type: 'hero', id: 'hero' } },
    { delay: 280, append: { type: 'system', id: 's1', time: '9:33 PM', sub: 'Privacy protected — speak freely' } },
    { delay: 700, append: { type: 'typing-bot', id: 't1' } },
    { delay: 900, replace: 't1', append: { type: 'bot', id: 'b1', text: "We're outside service hours right now. The team is on Mon–Sun, 9 AM – 10 PM. Leave a note and a specialist will be on the line the moment we reopen." } },
  ],

  'expired-modal': [
    { delay: 0,    stage: 4, append: { type: 'system', id: 's0', time: '5:44 PM' } },
    { delay: 200,  append: { type: 'bot', id: 'b0', text: 'Got it — pinging nearby pros now.' } },
    { delay: 300,  append: { type: 'quotes', id: 'quotes' } },
    { delay: 400,  action: 'show-modal' },
  ],

  'expired-chat': [
    { delay: 0,    stage: 4, append: { type: 'quotes', id: 'quotes', stale: true } },
    { delay: 600,  append: { type: 'divider', id: 'd1', label: 'Earlier conversation' } },
    { delay: 400,  append: { type: 'typing-pro', id: 't1' } },
    { delay: 900,  replace: 't1', append: { type: 'pro', id: 'p1', text: "Your 10:00–10:30 AM repair window has expired. Pick a new time and we'll re-match you with vendors." } },
    { delay: 800,  append: { type: 'order', id: 'order', pending: true } },
  ],

  'return-visit': [
    { delay: 0,    stage: 4, append: { type: 'divider', id: 'd1', label: 'Earlier conversation' } },
    { delay: 400,  append: { type: 'typing-pro', id: 't1' } },
    { delay: 900,  replace: 't1', append: { type: 'bot-q', id: 'q1', text: 'Did the previous tech sort it out for you? Anything else I can help with?', options: ['The diagnosis was off', "The repair plan didn't hold up", 'The vendor charged more than the quote'] } },
    { wait: 'q1' },
    { delay: 600,  append: { type: 'me', id: 'm1', text: 'Nope, all good' } },
    { delay: 900,  append: { type: 'typing-pro', id: 't2' } },
    { delay: 800,  replace: 't2', append: { type: 'pro', id: 'p1', text: "Glad to hear it. One quick thing before I close out — how was it?" } },
    { delay: 500,  append: { type: 'quick-rating', id: 'rate' } },
    { wait: 'action:rate' },
    { delay: 600,  append: { type: 'pro', id: 'p2', text: "Appreciate that. If you want, leave a longer review below — totally optional." } },
    { delay: 600,  append: { type: 'invite', id: 'invite' } },
  ],
};

const STAGE_BY_SCENARIO = {
  default: 1, 'cat-litter': 1, 'off-hours': 1,
  'expired-modal': 4, 'expired-chat': 4, 'return-visit': 4,
};

// ─── Player ───────────────────────────────────────────────────────
function Player({ scenario, onSceneEnd }) {
  const [messages, setMessages] = React.useState([]);
  const [stage, setStage] = React.useState(STAGE_BY_SCENARIO[scenario] || 1);
  const [waiting, setWaiting] = React.useState(null); // id we're waiting on
  const [modal, setModal] = React.useState(null);
  const [bookedVendor, setBookedVendor] = React.useState(null);
  const scrollRef = React.useRef(null);
  const stepIdx = React.useRef(0);
  const cancelled = React.useRef(false);

  // reset on scenario change
  React.useEffect(() => {
    cancelled.current = true;
    setMessages([]);
    setWaiting(null);
    setModal(null);
    setBookedVendor(null);
    setStage(STAGE_BY_SCENARIO[scenario] || 1);
    stepIdx.current = 0;
    cancelled.current = false;
    runFrom(0);
    // eslint-disable-next-line
  }, [scenario]);

  // autoscroll
  React.useEffect(() => {
    const el = scrollRef.current;
    if (el) el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
  }, [messages, modal]);

  function applyStep(step) {
    if (step.stage) setStage(step.stage);
    if (step.action === 'show-modal') {
      setModal('expired');
      return;
    }
    setMessages(prev => {
      let next = prev;
      if (step.replace) next = next.filter(m => m.id !== step.replace);
      if (step.append) next = [...next, step.append];
      return next;
    });
  }

  function runFrom(idx) {
    const script = SCRIPTS[scenario];
    if (!script) return;
    let i = idx;
    const next = () => {
      if (cancelled.current) return;
      if (i >= script.length) { onSceneEnd && onSceneEnd(); return; }
      const step = script[i];
      if (step.wait) {
        setWaiting(step.wait);
        // pause; resumed by user action
        return;
      }
      setTimeout(() => {
        if (cancelled.current) return;
        applyStep(step);
        i++;
        stepIdx.current = i;
        next();
      }, step.delay || 0);
    };
    next();
  }

  function resumeAfterWait(matchKey) {
    if (!waiting) return;
    if (waiting === matchKey || matchKey === '*' || waiting.startsWith('action:') === false) {
      // generic id wait
      setWaiting(null);
      runFrom(stepIdx.current + 1);
      stepIdx.current = stepIdx.current + 1;
    }
  }

  const ctx = {
    onPick: (qId, text) => {
      // append user message in place of waiting, advance
      if (waiting === qId) {
        // strip the bot-q options to lock the choice
        setMessages(prev => prev.map(m => m.id === qId ? { ...m, options: [] } : m));
        setMessages(prev => [...prev, { type: 'me', id: 'pick-' + Date.now(), text }]);
        setWaiting(null);
        // Cat-litter fallback: if self-serve didn't fix it, escalate to a pro
        // by jumping to the default scenario's full repair flow.
        if (/talk to a pro/i.test(text)) {
          onSceneEnd && onSceneEnd('default');
          return;
        }
        runFrom(stepIdx.current + 1);
        stepIdx.current = stepIdx.current + 1;
      }
    },
    onAction: (a) => {
      // Wildcard match: scripts can wait on a prefix like 'action:book-vendor'
      // and any 'book-vendor:X' fulfills it. Keeps script readable when the
      // exact suffix (vendor key) is user-determined.
      const fullKey = 'action:' + a;
      const prefixKey = 'action:' + a.split(':')[0];
      const matchedWait = waiting && (waiting === fullKey || waiting === prefixKey);

      if (a.startsWith('book-vendor:')) {
        const k = a.split(':')[1];
        setBookedVendor(k);
        setModal(null);
      }
      if (matchedWait) {
        setWaiting(null);
        runFrom(stepIdx.current + 1);
        stepIdx.current = stepIdx.current + 1;
        return;
      }
      if (a === 'open-review') {
        setModal('review');
        return;
      }
      if (a.startsWith('view-vendor:')) {
        setModal('vendor:' + a.split(':')[1]);
      }
    },
    bookedVendor,
  };

  return (
    <div style={{ position: 'relative' }}>
      {/* Outer bezel — Cosmic Orange titanium */}
      <div style={{
        width: 448, height: 964, borderRadius: 62,
        background: 'linear-gradient(135deg, #F0A06A 0%, #D26E3E 18%, #B04017 46%, #8A2C0A 60%, #B84218 78%, #E07B3D 100%)',
        padding: 4, position: 'relative',
        boxShadow:
          'inset 0 1.5px 0 rgba(255,210,170,.55), inset 0 -1px 0 rgba(60,16,4,.6),' +
          '0 1px 0 rgba(255,255,255,.04) inset,' +
          '0 44px 96px -22px rgba(120,46,14,.55),' +
          '0 14px 36px -10px rgba(120,46,14,.34),' +
          '0 0 0 1px rgba(60,20,8,.18)',
      }}>
        {/* Side button highlights — thin orange titanium accents */}
        <div style={{ position: 'absolute', left: -2, top: 110, width: 3, height: 32, borderRadius: 2, background: 'linear-gradient(90deg, #6B2706, #B5481A)' }} />
        <div style={{ position: 'absolute', left: -2, top: 180, width: 3, height: 60, borderRadius: 2, background: 'linear-gradient(90deg, #6B2706, #B5481A)' }} />
        <div style={{ position: 'absolute', left: -2, top: 248, width: 3, height: 60, borderRadius: 2, background: 'linear-gradient(90deg, #6B2706, #B5481A)' }} />
        <div style={{ position: 'absolute', right: -2, top: 200, width: 3, height: 96, borderRadius: 2, background: 'linear-gradient(270deg, #6B2706, #B5481A)' }} />
        <div style={{ width: 440, height: 956, borderRadius: 58, overflow: 'hidden', background: FC.surface, position: 'relative', display: 'flex', flexDirection: 'column', fontFamily: FF.text, color: FC.ink }}>
          {/* Dynamic island */}
          <div style={{
            position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
            width: 124, height: 37, borderRadius: 22,
            background: '#08070A', zIndex: 50,
            boxShadow: 'inset 0 1px 0 rgba(255,255,255,.04), 0 1px 2px rgba(0,0,0,.4)',
          }} />
          <StatusBar />
          <Header active={stage} proJoined={stage >= 2 && scenario !== 'off-hours'} />
          <div ref={scrollRef} className="scroll" style={{ flex: 1, overflow: 'auto', background: FC.bg, paddingBottom: 14, overscrollBehavior: 'contain' }}>
            {messages.map(m => renderMessage(m, ctx))}
          </div>
          <Composer
            leftLabel={scenario === 'return-visit' ? 'Rate this conversation' : null}
            placeholder={
              scenario === 'return-visit' ? 'How was it?' :
              scenario === 'off-hours' ? 'Leave a note for the team…' :
              stage < 2 ? 'Tell us what is going on…' :
              'Reply to Mike Chen…'
            }
          />
          <HomeIndicator />

          {modal === 'expired' && <ExpiredModal onAct={() => { setModal(null); onSceneEnd && onSceneEnd('expired-chat'); }} />}
          {modal === 'review'  && <ReviewSheet onClose={() => setModal(null)} />}
          {modal && modal.startsWith('vendor:') && (
            <VendorDetailOverlay
              vendorKey={modal.split(':')[1]}
              onClose={() => setModal(null)}
              onBook={(k) => ctx.onAction('book-vendor:' + k)}
            />
          )}
        </div>
      </div>
    </div>
  );
}

// ─── App shell ────────────────────────────────────────────────────
const SCENARIOS = [
  { id: 'default',         label: 'Standard repair · book a pro' },
  { id: 'cat-litter',      label: 'Self-serve fix' },
  { id: 'off-hours',       label: 'After hours' },
  { id: 'expired-modal',   label: 'Quote expired · before action' },
  { id: 'expired-chat',    label: 'Quote expired · after action' },
  { id: 'return-visit',    label: 'Post-service follow-up' },
];

function App() {
  const [scenario, setScenario] = React.useState('default');
  const [nonce, setNonce] = React.useState(0);
  const replay = () => setNonce(n => n + 1);
  const onSceneEnd = (next) => { if (next) setScenario(next); };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 28, padding: '0 24px' }}>
      <Player key={scenario + '-' + nonce} scenario={scenario} onSceneEnd={onSceneEnd} />
      {/* Scenario rail */}
      <div style={{
        display: 'flex', gap: 6, flexWrap: 'wrap', justifyContent: 'center',
        padding: 6, borderRadius: 100,
        background: 'rgba(255,255,255,.85)', backdropFilter: 'blur(20px)',
        border: '1px solid rgba(27,24,20,.06)',
        boxShadow: '0 1px 2px rgba(27,24,20,.04), 0 8px 20px -8px rgba(27,24,20,.12)',
        maxWidth: 600,
      }}>
        {SCENARIOS.map(s => (
          <button key={s.id}
            onClick={() => { setScenario(s.id); setNonce(n => n + 1); }}
            className="btn-press"
            style={{
              height: 32, padding: '0 14px', borderRadius: 100, border: 0,
              background: scenario === s.id ? '#1B1814' : 'transparent',
              color: scenario === s.id ? '#FDFAF2' : '#3D3833',
              fontFamily: "'Inter', system-ui, sans-serif",
              fontSize: 12, fontWeight: scenario === s.id ? 600 : 500,
              letterSpacing: '-0.05px', cursor: 'pointer',
              transition: 'background .25s, color .25s',
            }}>{s.label}</button>
        ))}
        <div style={{ width: 1, background: 'rgba(27,24,20,.08)', margin: '4px 4px' }} />
        <button onClick={replay} className="btn-press" style={{ height: 32, padding: '0 14px', borderRadius: 100, border: 0, background: 'transparent', color: '#8A847A', fontFamily: "'Inter', system-ui, sans-serif", fontSize: 12, fontWeight: 500, cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 5 }}>
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M10 6a4 4 0 1 1-1.2-2.8M10 2v2.5H7.5" stroke="#8A847A" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>
          Replay
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('flow-root')).render(<App />);

</script>
</body>
