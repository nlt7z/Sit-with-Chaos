<svg width="100%" viewBox="0 0 1360 1840" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>IM consultation workflow map</title>
  <desc>Redrawn swimlane map of user, platform, and merchant actions across five consultation stages.</desc>
  <defs>
    <marker id="flow-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8.5 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .top { fill: #eef2ff; stroke: #dbe5ff; stroke-width: 2; }
      .lane-title { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 1.2px; fill: #44506a; }
      .lane-sep { stroke: #d8e1f2; stroke-width: 2; stroke-dasharray: 8 10; }
      .stage-line { stroke: #dfe5f2; stroke-width: 2; }
      .stage-chip { fill: #f1f5ff; stroke: #ccd8f2; stroke-width: 2; }
      .stage-chip-text { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.8px; fill: #5a6785; }
      .node { fill: #ffffff; stroke: #cfd9ee; stroke-width: 2; }
      .node-title { font: 650 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1c2436; }
      .node-sub { font: 460 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5d6882; }
      .flow { fill: none; stroke: #6477a6; stroke-width: 2.4; marker-end: url(#flow-arrow); }
      .note { font: 520 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64728f; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1360" height="1840" />
  <rect class="top" x="0" y="0" width="1360" height="84" />

  <line class="lane-sep" x1="430" y1="0" x2="430" y2="1840" />
  <line class="lane-sep" x1="920" y1="0" x2="920" y2="1840" />

  <text class="lane-title" x="215" y="52" text-anchor="middle">USER</text>
  <text class="lane-title" x="675" y="52" text-anchor="middle">PLATFORM</text>
  <text class="lane-title" x="1140" y="52" text-anchor="middle">MERCHANT</text>

  <line class="stage-line" x1="0" y1="420" x2="1360" y2="420" />
  <line class="stage-line" x1="0" y1="760" x2="1360" y2="760" />
  <line class="stage-line" x1="0" y1="1100" x2="1360" y2="1100" />
  <line class="stage-line" x1="0" y1="1440" x2="1360" y2="1440" />

  <rect class="stage-chip" x="24" y="110" rx="20" ry="20" width="126" height="44" />
  <text class="stage-chip-text" x="87" y="139" text-anchor="middle">STAGE 1</text>
  <rect class="stage-chip" x="24" y="450" rx="20" ry="20" width="126" height="44" />
  <text class="stage-chip-text" x="87" y="479" text-anchor="middle">STAGE 2</text>
  <rect class="stage-chip" x="24" y="790" rx="20" ry="20" width="126" height="44" />
  <text class="stage-chip-text" x="87" y="819" text-anchor="middle">STAGE 3</text>
  <rect class="stage-chip" x="24" y="1130" rx="20" ry="20" width="126" height="44" />
  <text class="stage-chip-text" x="87" y="1159" text-anchor="middle">STAGE 4</text>
  <rect class="stage-chip" x="24" y="1470" rx="20" ry="20" width="126" height="44" />
  <text class="stage-chip-text" x="87" y="1499" text-anchor="middle">STAGE 5</text>

  <!-- Stage 1 -->
  <rect class="node" x="92" y="180" rx="18" ry="18" width="290" height="146" />
  <text class="node-title" x="118" y="230">Searches repair intent</text>
  <text class="node-sub" x="118" y="266">Finds official diagnosis entry</text>

  <rect class="node" x="500" y="180" rx="18" ry="18" width="360" height="146" />
  <text class="node-title" x="526" y="230">Detect high-intent query</text>
  <text class="node-sub" x="526" y="266">Surface trusted diagnosis card</text>

  <path class="flow" d="M382 253 L500 253" />
  <path class="flow" d="M245 326 L245 366 L612 366 L612 326" />
  <text class="note" x="628" y="358">Tap card to enter IM diagnosis chat</text>

  <!-- Stage 2 -->
  <rect class="node" x="92" y="520" rx="18" ry="18" width="300" height="154" />
  <text class="node-title" x="118" y="570">Describe issue in chat</text>
  <text class="node-sub" x="118" y="606">Text, chips, and image upload</text>

  <rect class="node" x="500" y="500" rx="18" ry="18" width="360" height="134" />
  <text class="node-title" x="526" y="548">Assign expert and context</text>
  <text class="node-sub" x="526" y="584">Identity and trust card in thread</text>

  <rect class="node" x="500" y="652" rx="18" ry="18" width="360" height="94" />
  <text class="node-title" x="526" y="708">Generate structured service order</text>

  <path class="flow" d="M392 598 L500 567" />
  <path class="flow" d="M680 634 L680 652" />
  <path class="flow" d="M500 702 L392 702" />
  <text class="note" x="118" y="736">User confirms quote request parameters</text>

  <!-- Stage 3 -->
  <rect class="node" x="500" y="842" rx="18" ry="18" width="360" height="146" />
  <text class="node-title" x="526" y="892">Filter and rank merchants</text>
  <text class="node-sub" x="526" y="928">Area, SLA, quality score, coverage</text>

  <rect class="node" x="972" y="842" rx="18" ry="18" width="300" height="146" />
  <text class="node-title" x="998" y="892">Top merchants quote</text>
  <text class="node-sub" x="998" y="928">Bid with timing and price</text>

  <rect class="node" x="500" y="990" rx="18" ry="18" width="360" height="94" />
  <text class="node-title" x="526" y="1046">Quote list streams into IM</text>

  <path class="flow" d="M860 915 L972 915" />
  <path class="flow" d="M1122 988 L1122 1037 L860 1037" />
  <path class="flow" d="M500 1037 L392 1037" />
  <text class="note" x="118" y="1072">User compares offers and selects one merchant</text>

  <!-- Stage 4 -->
  <rect class="node" x="500" y="1180" rx="18" ry="18" width="360" height="134" />
  <text class="node-title" x="526" y="1228">Bind quote to transaction</text>
  <text class="node-sub" x="526" y="1264">Create deposit and balance orders</text>

  <rect class="node" x="972" y="1180" rx="18" ry="18" width="300" height="134" />
  <text class="node-title" x="998" y="1228">Merchant completes service</text>
  <text class="node-sub" x="998" y="1264">On-site work and status closure</text>

  <path class="flow" d="M860 1247 L972 1247" />
  <path class="flow" d="M972 1288 L392 1288" />
  <text class="note" x="118" y="1324">User pays remaining balance online</text>

  <!-- Stage 5 -->
  <rect class="node" x="92" y="1528" rx="18" ry="18" width="300" height="142" />
  <text class="node-title" x="118" y="1578">Rate and tag quality</text>
  <text class="node-sub" x="118" y="1614">Score plus issue feedback chips</text>

  <rect class="node" x="500" y="1528" rx="18" ry="18" width="360" height="142" />
  <text class="node-title" x="526" y="1578">Update ranking model</text>
  <text class="node-sub" x="526" y="1614">Improve future quote precision</text>

  <path class="flow" d="M392 1599 L500 1599" />
  <path class="flow" d="M245 1670 L245 1740 L680 1740 L680 1670" />
  <text class="note" x="702" y="1734">Next visit reuses history for faster expert assignment</text>
</svg>
